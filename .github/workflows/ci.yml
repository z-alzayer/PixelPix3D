name: CI

on:
  push:
    branches: ["**"]
    paths:
      - "source/**"
      - "filter/**"
      - "romfs/**"
      - "Makefile"
      - "*.rsf"
      - "VERSION"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [master]
    paths:
      - "source/**"
      - "filter/**"
      - "romfs/**"
      - "Makefile"
      - "*.rsf"
      - "VERSION"
  workflow_run:
    workflows: ["Build and push builder image"]
    types: [completed]
    branches: [master]

jobs:
  build:
    name: Build 3DSX + CIA
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: write
      packages: read
    container:
      image: ghcr.io/z-alzayer/pixelpix3d-builder:latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Read version
        id: version
        run: echo "version=v$(cat VERSION | tr -d '[:space:]')" >> "$GITHUB_OUTPUT"

      - name: Build 3DSX
        run: make

      - name: Build CIA
        run: make cia

      - name: Release
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.version }}
          files: |
            PixelPix3D.3dsx
            PixelPix3D.smdh
            PixelPix3D.cia
