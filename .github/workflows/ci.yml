name: CI

on:
  push:
    branches: ["**"]
    paths-ignore:
      - Dockerfile
  pull_request:
    branches: [master]
  workflow_run:
    workflows: ["Build and push builder image"]
    types: [completed]
    branches: [master]

jobs:
  build:
    name: Build 3DSX + CIA
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    container:
      image: ghcr.io/z-alzayer/pixelpix3d-builder:latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Build 3DSX
        run: make

      - name: Build CIA
        run: make cia

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: 3ds_camera-${{ github.event.workflow_run.head_sha || github.sha }}
          path: |
            PixelPix3D.3dsx
            PixelPix3D.smdh
            PixelPix3D.cia
          if-no-files-found: error
